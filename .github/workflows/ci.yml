name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci
      - name: Run component tests
        run: npm run test
      - name: Build app
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --build postgres redis backend frontend
      - name: Seed data
        run: docker compose exec -T backend python scripts/seed.py
      - name: Run E2E smoke
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_ADMIN_EMAIL: admin@outcomes.ai
          E2E_ADMIN_PASSWORD: Admin@123
        run: npm run test:e2e
      - name: Shutdown stack
        if: always()
        run: docker compose down -v
