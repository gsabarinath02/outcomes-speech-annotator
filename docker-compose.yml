services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-outcomes_annotator}
      POSTGRES_USER: ${POSTGRES_USER:-outcomes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outcomes_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-outcomes_user} -d ${POSTGRES_DB:-outcomes_annotator}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
      args:
        INSTALL_ALIGNMENT_DEPS: ${INSTALL_ALIGNMENT_DEPS:-true}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://outcomes_user:outcomes_password@postgres:5432/outcomes_annotator}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JOBS_INLINE: ${JOBS_INLINE:-false}
    volumes:
      - backend_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./apps/backend
      args:
        INSTALL_ALIGNMENT_DEPS: ${INSTALL_ALIGNMENT_DEPS:-true}
    restart: unless-stopped
    command: ["python", "/app/scripts/worker.py"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://outcomes_user:outcomes_password@postgres:5432/outcomes_annotator}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JOBS_INLINE: "false"
    volumes:
      - backend_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
